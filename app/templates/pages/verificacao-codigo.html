<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta | Home Care+</title>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>


  <!-- HEADER PARTIAL -->
  <div id="site-header"></div>

  <main class="min-vh-100 d-flex align-items-center" aria-label="Tela de verificação de código">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-6 col-xxl-4">
          <section class="py-4 px-2">

            <!-- Topo -->
            <div class="row align-items-center mb-4">
              <div class="col-3 col-sm-3 col-md-3 col-lg-3 col-xl-3 col-xxl-3">
                <a
                  href="cadastro.html"
                  class="text-decoration-none text-dark fs-2"
                  aria-label="Voltar"
                >
                  &#8592;
                </a>
              </div>

              <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6 text-center">
                <h1 class="fs-3 fw-bold text-dark mb-0">Verificação</h1>
              </div>

              <div class="col-3 col-sm-3 col-md-3 col-lg-3 col-xl-3 col-xxl-3"></div>
            </div>

            <!-- Texto de apoio -->
            <div class="text-center mb-4">
              <p class="fs-5 text-secondary mb-0">
                Digite o código de verificação enviado para o seu e-mail.
              </p>
            </div>

            <!-- Formulário -->
            <form action="#" method="post" novalidate>
              <div class="row justify-content-center gy-4">

                <!-- Campos do código -->
                <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                  <div class="row justify-content-center gx-2 gx-sm-3">
                    <div class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 col-xxl-2">
                      <input
                        type="text"
                        class="form-control form-control-lg text-center"
                        maxlength="1"
                        inputmode="numeric"
                        aria-label="Primeiro dígito do código"
                      />
                    </div>
                    <div class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 col-xxl-2">
                      <input
                        type="text"
                        class="form-control form-control-lg text-center"
                        maxlength="1"
                        inputmode="numeric"
                        aria-label="Segundo dígito do código"
                      />
                    </div>
                    <div class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 col-xxl-2">
                      <input
                        type="text"
                        class="form-control form-control-lg text-center"
                        maxlength="1"
                        inputmode="numeric"
                        aria-label="Terceiro dígito do código"
                      />
                    </div>
                    <div class="col-2 col-sm-2 col-md-2 col-lg-2 col-xl-2 col-xxl-2">
                      <input
                        type="text"
                        class="form-control form-control-lg text-center"
                        maxlength="1"
                        inputmode="numeric"
                        aria-label="Quarto dígito do código"
                      />
                    </div>
                  </div>
                </div>

                <!-- Botão principal -->
                <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mt-3">
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg w-100"
                    aria-label="Confirmar código"
                  >
                    Confirmar código
                  </button>
                </div>

                <!-- Reenviar -->
                <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 text-center">
                  <p class="fs-6 text-secondary mb-0">
                    Não recebeu o código?
                    <a
                      href="#"
                      class="text-decoration-none fw-semibold text-dark"
                      aria-label="Reenviar código"
                    >
                      Reenviar
                    </a>
                  </p>
                </div>

              </div>
            </form>

          </section>
        </div>
      </div>
    </div>
  </main>

 <!-- Footer auth -->
  <div id="footer-auth"></div>


<script src="../js/partials.js"></script>
<script src="../js/navbar.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", async function () {
    await initPartials({
      header: { id: "site-header", file: "../partials/header-public.html" },
      footer: { id: "site-footer", file: "../partials/footer-public.html" }
    });

    const form = document.getElementById("cadastroForm");

    if (form) {
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        window.location.href = "cadastro.html";
      });
    }
  });
</script>


</body>
</html>
