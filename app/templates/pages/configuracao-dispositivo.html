<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ page_title }} | Caixa Inteligente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

{% include 'partials/header-auth.html' %}

<main class="container py-5 mb-5">

  <h1 class="h4 fw-bold mb-2">Configurar caixa</h1>
  <p class="text-secondary mb-4">Vamos fazer isso juntos em poucos passos.</p>

  <!-- PROGRESSO -->
  <div class="progress mb-4" style="height: 10px;">
    <div id="progressBar" class="progress-bar" style="width: 20%"></div>
  </div>

  <form method="post" id="formWizard">

    <!-- PASSO 1 -->
    <div class="step" data-step="1">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Qual o nome da sua caixa?</h2>
        <input name="nome_dispositivo" id="nomeDispositivo" class="form-control form-control-lg" placeholder="Ex: Caixa da manhã">
      </div>
    </div>

    <!-- PASSO 2 -->
    <div class="step d-none" data-step="2">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Qual o tratamento?</h2>
        <input name="nome_tratamento" id="nomeTratamento" class="form-control form-control-lg" placeholder="Ex: Pressão">
      </div>
    </div>

    <!-- PASSO 3 -->
    <div class="step d-none" data-step="3">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Horários da medicação</h2>

        <label class="form-label">Ciclo</label>
        <select id="ciclo" class="form-select form-select-lg">
          <option value="6">6h</option>
          <option value="8">8h</option>
          <option value="12" selected>12h</option>
          <option value="24">24h</option>
        </select>

        <label class="form-label mt-3">Horário inicial</label>
        <input type="time" id="horaInicial" class="form-control form-control-lg">

        <label class="form-label mt-3">Quantidade de doses</label>
        <input type="number" id="doses" class="form-control form-control-lg" value="2">

        <button type="button" class="btn btn-outline-primary mt-3" onclick="gerarHorarios()">Gerar horários</button>

        <div id="horarios" class="mt-3"></div>

        <button type="button" class="btn btn-outline-primary mt-3" onclick="addHorario()">+ adicionar horário</button>
      </div>
    </div>

    <!-- PASSO 4 -->
    <div class="step d-none" data-step="4">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Alertas</h2>

        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" checked>
          <label class="form-check-label">Mensagem</label>
        </div>

        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" checked>
          <label class="form-check-label">Som</label>
        </div>

        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" checked>
          <label class="form-check-label">LED</label>
        </div>

      </div>
    </div>

    <!-- PASSO 5 -->
    <div class="step d-none" data-step="5">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Resumo</h2>

        <p><strong>Caixa:</strong> <span id="rCaixa"></span></p>
        <p><strong>Tratamento:</strong> <span id="rTratamento"></span></p>
        <p><strong>Horários:</strong> <span id="rHorarios"></span></p>

      </div>
    </div>

    <!-- BOTÕES -->
    <div class="d-flex gap-3 mt-4">
      <button type="button" id="btnBack" class="btn btn-outline-secondary w-50 d-none" onclick="back()">Voltar</button>
      <button type="button" id="btnNext" class="btn btn-primary w-100" onclick="next()">Continuar</button>
      <button type="submit" id="btnSave" class="btn btn-primary w-100 d-none">Salvar</button>
    </div>

  </form>

</main>

{% include 'partials/footer-auth.html' %}

<script>
let step = 1;

function showStep(n){
  document.querySelectorAll(".step").forEach(s=>s.classList.add("d-none"));
  document.querySelector(`[data-step="${n}"]`).classList.remove("d-none");

  document.getElementById("progressBar").style.width = (n*20)+"%";

  document.getElementById("btnBack").classList.toggle("d-none", n===1);
  document.getElementById("btnNext").classList.toggle("d-none", n===5);
  document.getElementById("btnSave").classList.toggle("d-none", n!==5);

  if(n===5) resumo();
}

function next(){ if(step<5){step++; showStep(step);} }
function back(){ if(step>1){step--; showStep(step);} }

function gerarHorarios(){
  const ciclo = parseInt(document.getElementById("ciclo").value);
  const horaInicial = document.getElementById("horaInicial").value;
  const doses = parseInt(document.getElementById("doses").value);

  if(!horaInicial) return;

  const [h,m] = horaInicial.split(":").map(Number);
  const base = new Date();
  base.setHours(h,m);

  const container = document.getElementById("horarios");
  container.innerHTML="";

  for(let i=0;i<doses;i++){
    const d = new Date(base);
    d.setHours(base.getHours()+ciclo*i);

    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");

    container.innerHTML += `
      <div class="d-flex gap-2 mt-2">
        <input type="time" name="horarios[]" value="${hh}:${mm}" class="form-control form-control-lg">
        <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">x</button>
      </div>`;
  }
}

function addHorario(){
  document.getElementById("horarios").innerHTML += `
    <div class="d-flex gap-2 mt-2">
      <input type="time" name="horarios[]" class="form-control form-control-lg">
      <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">x</button>
    </div>`;
}

function resumo(){
  document.getElementById("rCaixa").innerText = document.getElementById("nomeDispositivo").value;
  document.getElementById("rTratamento").innerText = document.getElementById("nomeTratamento").value;

  const horarios = [...document.querySelectorAll('[name="horarios[]"]')]
    .map(i=>i.value).join(", ");

  document.getElementById("rHorarios").innerText = horarios;
}

showStep(step);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
