<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Configurar Caixa | Caixa Inteligente</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (CORREÇÃO PRINCIPAL) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      padding-bottom: 80px;
    }

    .footer-app {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      z-index: 999;
    }

    .footer-link {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      color: #6c757d;
      text-decoration: none;
      font-size: 12px;
    }

    .footer-link i {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }

    .footer-link.active {
      color: #0d6efd;
      font-weight: 600;
    }
  </style>
</head>

<body class="bg-light">

<!-- HEADER SIMPLES -->
<header class="bg-primary text-white p-3 d-flex justify-content-between align-items-center">
  <div class="d-flex align-items-center gap-2">
    <img src="/img/logo.svg" width="36">
    <strong>Mad Smart</strong>
  </div>
  <button class="btn btn-outline-light">
    <i class="bi bi-list"></i>
  </button>
</header>

<main class="container py-4">

  <h1 class="h4 fw-bold mb-2">Configurar caixa</h1>
  <p class="text-secondary mb-4">Vamos fazer isso juntos em poucos passos.</p>

  <!-- PROGRESSO -->
  <div class="progress mb-4" style="height: 10px;">
    <div id="progressBar" class="progress-bar" style="width: 20%"></div>
  </div>

  <form id="formWizard">

    <!-- PASSO 1 -->
    <div class="step" data-step="1">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Qual o nome da sua caixa?</h2>
        <input id="nomeDispositivo" class="form-control form-control-lg" placeholder="Ex: Caixa da manhã">
      </div>
    </div>

    <!-- PASSO 2 -->
    <div class="step d-none" data-step="2">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Qual o tratamento?</h2>
        <input id="nomeTratamento" class="form-control form-control-lg" placeholder="Ex: Pressão">
      </div>
    </div>

    <!-- PASSO 3 -->
    <div class="step d-none" data-step="3">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Horários</h2>

        <input type="time" id="horaInicial" class="form-control form-control-lg">
        <button type="button" class="btn btn-outline-primary mt-3" onclick="addHorario()">Adicionar horário</button>

        <div id="horarios" class="mt-3"></div>
      </div>
    </div>

    <!-- PASSO 4 -->
    <div class="step d-none" data-step="4">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Alertas</h2>

        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" checked>
          <label class="form-check-label">Som</label>
        </div>

        <div class="form-check form-switch">
          <input type="checkbox" class="form-check-input" checked>
          <label class="form-check-label">LED</label>
        </div>
      </div>
    </div>

    <!-- PASSO 5 -->
    <div class="step d-none" data-step="5">
      <div class="card p-4">
        <h2 class="h5 fw-bold mb-3">Resumo</h2>

        <p><strong>Caixa:</strong> <span id="rCaixa"></span></p>
        <p><strong>Tratamento:</strong> <span id="rTratamento"></span></p>
        <p><strong>Horários:</strong> <span id="rHorarios"></span></p>
      </div>
    </div>

    <!-- BOTÕES -->
    <div class="d-flex gap-3 mt-4">
      <button type="button" id="btnBack" class="btn btn-outline-secondary w-50 d-none" onclick="back()">Voltar</button>
      <button type="button" id="btnNext" class="btn btn-primary w-100" onclick="next()">Continuar</button>
    </div>

  </form>

</main>

<!-- FOOTER CORRIGIDO -->
<footer class="footer-app d-flex">
  <a href="#" class="footer-link active">
    <i class="bi bi-house-door"></i>
    Home
  </a>
  <a href="#" class="footer-link">
    <i class="bi bi-clock"></i>
    Horários
  </a>
  <a href="#" class="footer-link">
    <i class="bi bi-cpu"></i>
    Dispositivos
  </a>
  <a href="#" class="footer-link">
    <i class="bi bi-person"></i>
    Perfil
  </a>
</footer>

<script>
let step = 1;

function showStep(n){
  document.querySelectorAll(".step").forEach(s=>s.classList.add("d-none"));
  document.querySelector(`[data-step="${n}"]`).classList.remove("d-none");

  document.getElementById("progressBar").style.width = (n*20)+"%";

  document.getElementById("btnBack").classList.toggle("d-none", n===1);
  document.getElementById("btnNext").innerText = n===5 ? "Finalizar" : "Continuar";

  if(n===5) resumo();
}

function next(){
  if(step<5){ step++; showStep(step); }
}

function back(){
  if(step>1){ step--; showStep(step); }
}

function addHorario(){
  const hora = document.getElementById("horaInicial").value;
  if(!hora) return;

  document.getElementById("horarios").innerHTML += `
    <div class="d-flex gap-2 mt-2">
      <input type="time" value="${hora}" class="form-control form-control-lg">
      <button type="button" class="btn btn-danger" onclick="this.parentElement.remove()">x</button>
    </div>`;
}

function resumo(){
  document.getElementById("rCaixa").innerText = document.getElementById("nomeDispositivo").value;
  document.getElementById("rTratamento").innerText = document.getElementById("nomeTratamento").value;

  const horarios = [...document.querySelectorAll('#horarios input')]
    .map(i=>i.value).join(", ");

  document.getElementById("rHorarios").innerText = horarios;
}

showStep(step);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
