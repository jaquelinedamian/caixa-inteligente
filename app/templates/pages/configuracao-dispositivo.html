<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ page_title }} | Caixa Inteligente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

{% include 'partials/header-auth.html' %}

<main class="container py-5">

<form method="post">

  <!-- TOPO -->
  <section class="mb-4">
    <h1 class="h4 fw-bold mb-1">Configurar caixa</h1>
    <p class="text-secondary mb-0">
      Configure o dispositivo e os horários do tratamento.
    </p>
  </section>

  <!-- DISPOSITIVO -->
  <section class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">

      <label class="form-label fw-semibold">Nome da caixa</label>
      <input name="nome_dispositivo" class="form-control form-control-lg" required>

      <label class="form-label fw-semibold mt-3">Bluetooth ID (opcional)</label>
      <input name="bluetooth_id" class="form-control">

    </div>
  </section>

  <!-- TRATAMENTO -->
  <section class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">

      <label class="form-label fw-semibold">Nome do tratamento</label>
      <input name="nome_tratamento" class="form-control form-control-lg" required>

      <label class="form-label fw-semibold mt-3">Tipo</label>
      <select name="tipo_tratamento" class="form-select form-select-lg">
        <option value="6h">6h</option>
        <option value="12h">12h</option>
        <option value="24h">24h</option>
      </select>

      <label class="form-label fw-semibold mt-3">Doses por ciclo</label>
      <input type="number" name="doses_por_ciclo" class="form-control">

      <div class="row mt-3">
        <div class="col">
          <label class="form-label">Data início</label>
          <input type="date" name="data_inicio" class="form-control">
        </div>
        <div class="col">
          <label class="form-label">Data fim</label>
          <input type="date" name="data_fim" class="form-control">
        </div>
      </div>

      <div class="form-check mt-3">
        <input type="checkbox" name="uso_continuo" class="form-check-input">
        <label class="form-check-label">Uso contínuo</label>
      </div>

    </div>
  </section>

  <!-- HORÁRIOS -->
  <section class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">

      <h2 class="h6 fw-bold mb-3">Horários</h2>

      <div id="listaHorarios" class="row g-3">
        <div class="col-12 col-lg-4 horario-item">
          <input type="time" name="horarios[]" class="form-control form-control-lg" required>
        </div>
      </div>

      <button type="button" class="btn btn-outline-primary mt-3" onclick="adicionarHorario()">
        + Adicionar horário
      </button>

    </div>
  </section>

  <!-- ALERTAS -->
  <section class="card border-0 shadow-sm rounded-4 mb-4">
    <div class="card-body">

      <h2 class="h6 fw-bold mb-3">Alertas</h2>

      <div class="form-check form-switch mb-2">
        <input type="checkbox" name="alerta_mensagem" class="form-check-input" checked>
        <label class="form-check-label">Mensagem</label>
      </div>

      <div class="form-check form-switch mb-2">
        <input type="checkbox" name="alerta_sonoro" class="form-check-input" checked>
        <label class="form-check-label">Som</label>
      </div>

      <div class="form-check form-switch mb-2">
        <input type="checkbox" name="alerta_led" class="form-check-input" checked>
        <label class="form-check-label">LED</label>
      </div>

      <div class="form-check form-switch">
        <input type="checkbox" name="alerta_vibratorio" class="form-check-input" checked>
        <label class="form-check-label">Vibração</label>
      </div>

    </div>
  </section>

  <!-- BOTÃO -->
  <button class="btn btn-primary btn-lg w-100">
    Salvar configuração
  </button>

</form>

</main>

{% include 'partials/footer-auth.html' %}

<script>
function adicionarHorario() {
  const container = document.getElementById("listaHorarios")

  const col = document.createElement("div")
  col.className = "col-12 col-lg-4 horario-item"

  col.innerHTML = `
    <div class="d-flex gap-2">
      <input type="time" name="horarios[]" class="form-control form-control-lg" required>
      <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.parentElement.remove()">✕</button>
    </div>
  `

  container.appendChild(col)
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
