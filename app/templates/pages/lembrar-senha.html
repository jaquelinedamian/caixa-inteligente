<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta | Home Care+</title>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>


  <!-- HEADER PARTIAL -->
  <div id="site-header"></div>

  <main class="min-vh-100 d-flex align-items-center" aria-label="Tela de recuperação de senha">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-6 col-xxl-4">
          <section class="py-4 px-2">

            <!-- Topo da página -->
            <div class="row align-items-center mb-5">
              <div class="col-3 col-sm-3 col-md-3 col-lg-3 col-xl-3 col-xxl-3">
                <a
                  href="login.html"
                  class="text-decoration-none text-dark fs-2"
                  aria-label="Voltar para login"
                >
                  &#8592;
                </a>
              </div>

              <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6 text-center">
                <h1 class="fs-3 fw-bold text-dark mb-0">Esqueceu a senha</h1>
              </div>

              <div class="col-3 col-sm-3 col-md-3 col-lg-3 col-xl-3 col-xxl-3"></div>
            </div>

            <!-- Conteúdo principal -->
            <div class="mb-4 text-center">
              <p class="fs-3 text-dark mb-0">
                Insira seu e-mail e enviaremos instruções sobre como redefini-lo.
              </p>
            </div>

            <!-- Formulário -->
            <form action="#" method="post" novalidate>
              <div class="row gy-3">
                <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                  <label for="email-recuperacao" class="form-label fs-5 text-dark">
                    E-mail
                  </label>
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    id="email-recuperacao"
                    name="email-recuperacao"
                    placeholder="email@email.com.br"
                    autocomplete="email"
                    aria-label="Digite seu e-mail para recuperação de senha"
                  />
                </div>

                <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12 mt-3">
                  <button
                    type="submit"
                    class="btn btn-primary btn-lg w-100"
                    aria-label="Enviar instruções de recuperação"
                  >
                    Enviar
                  </button>
                </div>
              </div>
            </form>

          </section>
        </div>
      </div>
    </div>
  </main>

 <!-- Footer auth -->
  <div id="footer-auth"></div>


<script src="../js/partials.js"></script>
<script src="../js/navbar.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", async function () {
    await initPartials({
      header: { id: "site-header", file: "../partials/header-public.html" },
      footer: { id: "site-footer", file: "../partials/footer-public.html" }
    });

    const form = document.getElementById("cadastroForm");

    if (form) {
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        window.location.href = "cadastro.html";
      });
    }
  });
</script>


</body>
</html>
