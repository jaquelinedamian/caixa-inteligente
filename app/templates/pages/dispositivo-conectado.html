<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta | Home Care+</title>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>


  <!-- HEADER PARTIAL -->
  <div id="site-header"></div>

  <main class="flex-grow-1 py-4" aria-label="Tela de dispositivo conectado">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-6 col-xxl-5">

          <!-- Topo -->
          <section class="mb-4">
            <div class="row align-items-center mb-3">
              <div class="col-3 col-sm-3 col-md-3 col-lg-3 col-xl-3 col-xxl-3">
                <a
                  href="buscar-dispositivos.html"
                  class="text-decoration-none text-dark fs-2"
                  aria-label="Voltar para buscar dispositivos"
                >
                  &#8592;
                </a>
              </div>

              <div class="col-6 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6 text-center">
                <h1 class="fs-3 fw-bold text-dark mb-0">Dispositivo</h1>
              </div>

              <div class="col-3 col-sm-3 col-md-3 col-lg-3 col-xl-3 col-xxl-3"></div>
            </div>
          </section>

          <!-- Sucesso -->
          <section class="text-center mb-4">
            <div class="row justify-content-center">
              <div class="col-4 col-sm-4 col-md-4 col-lg-4 col-xl-4 col-xxl-4">
                <div
                  class="rounded-circle bg-success-subtle d-flex align-items-center justify-content-center mx-auto"
                  style="width: 96px; height: 96px;"
                  aria-hidden="true"
                >
                  <span class="fs-1 text-success">&#10003;</span>
                </div>
              </div>
            </div>

            <div class="row justify-content-center mt-4">
              <div class="col-12 col-sm-11 col-md-10 col-lg-10 col-xl-10 col-xxl-10">
                <h2 class="fs-2 fw-bold text-dark mb-2">
                  Dispositivo conectado com sucesso
                </h2>
                <p class="fs-5 text-secondary mb-0">
                  Sua caixa inteligente já está pronta para ser configurada no aplicativo.
                </p>
              </div>
            </div>
          </section>

          <!-- Card do dispositivo -->
          <section class="mb-4" aria-label="Informações do dispositivo conectado">
            <div class="row">
              <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                <div class="card border-0 shadow-sm rounded-4">
                  <div class="card-body p-4">
                    <div class="row gy-3">
                      <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                        <h3 class="fs-4 fw-bold text-dark mb-1">Caixa Inteligente A01</h3>
                        <p class="text-secondary mb-0">ID: CI-A01-4582</p>
                      </div>

                      <div class="col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <div class="p-3 bg-light rounded-3">
                          <p class="text-secondary mb-1">Status</p>
                          <p class="fw-semibold text-success mb-0">Conectado</p>
                        </div>
                      </div>

                      <div class="col-12 col-sm-6 col-md-6 col-lg-6 col-xl-6 col-xxl-6">
                        <div class="p-3 bg-light rounded-3">
                          <p class="text-secondary mb-1">Sinal</p>
                          <p class="fw-semibold text-dark mb-0">Forte</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- Ações -->
          <section>
            <div class="row gy-3">
              <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                <a
                  href="configuracao-dispositivo.html"
                  class="btn btn-primary btn-lg w-100"
                  aria-label="Configurar tratamento"
                >
                  Configurar tratamento
                </a>
              </div>

              <div class="col-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 col-xxl-12">
                <a
                  href="dispositivos.html"
                  class="btn btn-outline-secondary btn-lg w-100"
                  aria-label="Voltar para a lista de dispositivos"
                >
                  Voltar para dispositivos
                </a>
              </div>
            </div>
          </section>

        </div>
      </div>
    </div>
  </main>

 <!-- Footer auth -->
  <div id="footer-auth"></div>


<script src="../js/partials.js"></script>
<script src="../js/navbar.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", async function () {
    await initPartials({
      header: { id: "site-header", file: "../partials/header-public.html" },
      footer: { id: "site-footer", file: "../partials/footer-public.html" }
    });

    const form = document.getElementById("cadastroForm");

    if (form) {
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        window.location.href = "cadastro.html";
      });
    }
  });
</script>




<script>
  document.addEventListener("DOMContentLoaded", async function () {
    await initPartials({
      header: { id: "site-header", file: "../partials/header-public.html" },
      footer: { id: "site-footer", file: "../partials/footer-public.html" }
    });

    const form = document.getElementById("cadastroForm");

    if (form) {
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        window.location.href = "cadastro.html";
      });
    }
  });
</script>


</body>
</html>
