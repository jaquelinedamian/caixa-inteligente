<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Caixa Inteligente | Download do App</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="min-vh-100" style="background-color: #4486FF;">

  <main
    class="container min-vh-100 d-flex align-items-center justify-content-center py-5"
    aria-label="Tela inicial de download do aplicativo"
  >
    <section class="w-100 text-center" style="max-width: 420px;">

      <div class="mb-4">
        <img
          src="{{ url_for('static', filename='img/logo-caixa-inteligente.svg') }}"
          alt="Logo Caixa Inteligente"
          class="img-fluid mb-4"
          style="max-width: 190px;"
        >

        <h1 class="text-white fw-bold mb-3">
          Caixa Inteligente
        </h1>

        <p class="text-white fs-5 mb-0">
          Para fazer o download do app selecione uma opção
        </p>
      </div>

      <div class="d-grid gap-3 mt-4">

        <a
          href="{{ url_for('main.login') }}"
          class="bg-white rounded-4 text-decoration-none p-3 shadow-sm d-flex align-items-center justify-content-center"
          aria-label="Baixar aplicativo na App Store"
        >
          <img
            src="{{ url_for('static', filename='img/apple.png') }}"
            alt="Baixar na App Store"
            class="img-fluid"
            style="max-height: 54px;"
          >
        </a>

        <a
          href="{{ url_for('main.login') }}"
          class="bg-white rounded-4 text-decoration-none p-3 shadow-sm d-flex align-items-center justify-content-center"
          aria-label="Baixar aplicativo na Google Play"
        >
          <img
            src="{{ url_for('static', filename='img/android.png') }}"
            alt="Baixar na Google Play"
            class="img-fluid"
            style="max-height: 54px;"
          >
        </a>

      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
