<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caixa Inteligente | Download do App</title>

  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body class="min-vh-100" style="background: #4486FF !important;">

  <div id="header-public"></div>

  <main class="d-flex align-items-center min-vh-100" aria-label="Tela inicial de download do aplicativo">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-6 col-xxl-4">
          <section class="text-center py-5">

            <div class="mb-4">
              <div class="mb-3" aria-hidden="true">
                <img
                  src="{{ url_for('static', filename='img/logo-caixa-inteligente.svg') }}"
                  alt="Logo Caixa Inteligente"
                  class="img-fluid"
                  style="max-width: 180px;"
                />
              </div>

              <h1 class="text-white fw-bold mb-2">Caixa Inteligente</h1>
              <p class="text-white fs-5 mb-0">
                Para fazer o download do app selecione uma opção
              </p>
            </div>

            <div class="row justify-content-center gy-3 mt-4">
              <div class="col-12 col-sm-10 col-md-9 col-lg-8 col-xl-8 col-xxl-8">
                <a
                  href="{{ url_for('main.login') }}"
                  class="d-flex align-items-center justify-content-center bg-white rounded-4 text-decoration-none p-3"
                  aria-label="Baixar aplicativo na App Store"
                >
                  <img
                    src="{{ url_for('static', filename='img/apple.png') }}"
                    alt="Baixar na App Store"
                    class="img-fluid"
                  />
                </a>
              </div>

              <div class="col-12 col-sm-10 col-md-9 col-lg-8 col-xl-8 col-xxl-8">
                <a
                  href="{{ url_for('main.login') }}"
                  class="d-flex align-items-center justify-content-center bg-white rounded-4 text-decoration-none p-3"
                  aria-label="Baixar aplicativo na Google Play"
                >
                  <img
                    src="{{ url_for('static', filename='img/android.png') }}"
                    alt="Baixar na Google Play"
                    class="img-fluid"
                  />
                </a>
              </div>
            </div>

          </section>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-public"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
