<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta | Home Care+</title>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>


  <!-- HEADER PARTIAL -->
  <div id="site-header"></div>

  <main class="flex-grow-1 d-flex align-items-center" aria-label="Tela de primeiro acesso">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-12 col-md-10 col-lg-8 col-xl-6 col-xxl-5">
          <section class="py-4 text-center">

            <!-- Saudação -->
            <div class="mb-4">
              <h1 class="fs-2 fw-bold text-dark mb-2">
                Olá, seja bem-vindo!
              </h1>
              <p class="fs-5 text-secondary mb-0">
                Para começar, conecte seu dispositivo.
              </p>
            </div>

            <!-- Imagem principal -->
            <div class="row justify-content-center my-4">
              <div class="col-10 col-sm-9 col-md-8 col-lg-8 col-xl-8 col-xxl-8">
                <img
                  src="../img/primeiro-login-ilustracao.png"
                  alt="Ilustração de boas-vindas"
                  class="img-fluid"
                />
              </div>
            </div>

            <!-- Texto de apoio -->
            <div class="row justify-content-center mb-4">
              <div class="col-12 col-sm-11 col-md-10 col-lg-10 col-xl-10 col-xxl-10">
                <p class="fs-5 text-dark mb-0">
                  Conecte sua caixa inteligente para acompanhar sua rotina e configurar seus tratamentos com mais segurança.
                </p>
              </div>
            </div>

            <!-- Botão principal -->
            <div class="row justify-content-center mt-4">
              <div class="col-12 col-sm-10 col-md-8 col-lg-8 col-xl-8 col-xxl-8">
                <a
                  href="buscar-dispositivos.html"
                  class="btn btn-primary btn-lg w-100"
                  aria-label="Adicionar dispositivo"
                >
                  Adicionar dispositivo
                </a>
              </div>
            </div>

          </section>
        </div>
      </div>
    </div>
  </main>

 <!-- Footer auth -->
  <div id="footer-auth"></div>


<script src="../js/partials.js"></script>
<script src="../js/navbar.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", async function () {
    await initPartials({
      header: { id: "site-header", file: "../partials/header-public.html" },
      footer: { id: "site-footer", file: "../partials/footer-public.html" }
    });

    const form = document.getElementById("cadastroForm");

    if (form) {
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        window.location.href = "cadastro.html";
      });
    }
  });
</script>


</body>
</html>
