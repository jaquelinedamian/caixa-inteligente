<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<main class="container d-flex align-items-center justify-content-center min-vh-100">

  <div class="card border-0 shadow-sm rounded-4 p-4" style="max-width: 420px; width: 100%;">

    <h1 class="h4 fw-bold mb-3 text-center">
      Recuperar senha
    </h1>

    <p class="text-secondary text-center mb-4">
      Informe seu e-mail para receber instruções.
    </p>

    <form>
      <div class="mb-3">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" placeholder="seu@email.com">
      </div>

      <button class="btn btn-primary w-100">
        Enviar instruções
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('main.login') }}" class="text-decoration-none">
        Voltar para login
      </a>
    </div>

  </div>

</main>

</body>
</html>
